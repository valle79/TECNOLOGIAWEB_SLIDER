{% extends "base.html" %}

{% block title %}Registrarse - Vinos del Valle{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-red-50 via-white to-red-50 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-red-800 to-red-900 rounded-full mb-4 shadow-lg">
                <span class="text-4xl">🍷</span>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2">
                Crear Cuenta
            </h2>
            <p class="text-sm text-gray-600">
                Únete a nuestra comunidad de amantes del vino
            </p>
        </div>
        
        <!-- Register Card -->
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
            <form class="space-y-5" action="{{ url_for('auth.register') }}" method="POST">
                <div>
                    <label for="full_name" class="block text-sm font-medium text-gray-700 mb-2">Nombre Completo</label>
                    <input id="full_name" name="full_name" type="text" required 
                           class="block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-800 focus:border-transparent transition sm:text-sm" 
                           placeholder="Juan Pérez">
                </div>
                
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input id="email" name="email" type="email" required 
                           class="block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-800 focus:border-transparent transition sm:text-sm" 
                           placeholder="tu@email.com">
                </div>
                
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">Teléfono (opcional)</label>
                    <input id="phone" name="phone" type="tel" 
                           class="block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-800 focus:border-transparent transition sm:text-sm" 
                           placeholder="+51 999 888 777">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                    <input id="password" name="password" type="password" required 
                           class="block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-800 focus:border-transparent transition sm:text-sm" 
                           placeholder="Mínimo 6 caracteres">
                    <p class="mt-1 text-xs text-gray-500">Debe tener al menos 6 caracteres</p>
                </div>
                
                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-2">Confirmar Contraseña</label>
                    <input id="confirm_password" name="confirm_password" type="password" required 
                           class="block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-800 focus:border-transparent transition sm:text-sm" 
                           placeholder="Repite tu contraseña">
                </div>

                <div class="pt-2">
                    <button type="submit" 
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-gradient-to-r from-red-800 to-red-900 hover:from-red-900 hover:to-red-950 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-800 transition duration-150 ease-in-out transform hover:scale-[1.02]">
                        Crear Cuenta
                    </button>
                </div>
            </form>

            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">¿Ya tienes cuenta?</span>
                    </div>
                </div>

                <div class="mt-6">
                    <a href="{{ url_for('auth.login') }}" 
                       class="w-full flex justify-center py-3 px-4 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-800 transition duration-150 ease-in-out">
                        Iniciar sesión
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
