<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Modern interactive slider with Flask backend">
    <title>Flask Modern Slider</title>

    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="m-0 p-0 overflow-hidden">
    <!-- Navbar -->
    <nav class="fixed top-0 left-0 w-full z-50 bg-white/10 backdrop-blur-md border-b border-white/20">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

            <!-- Logo -->
            <div class="text-white text-2xl font-bold tracking-wide">
                TechSlider
            </div>

            <!-- Menu Desktop -->
            <div class="hidden md:flex items-center gap-8 text-white font-medium">
                <a href="#" class="hover:text-gray-300 transition">Inicio</a>
                <a href="#" class="hover:text-gray-300 transition">Servicios</a>
                <a href="#" class="hover:text-gray-300 transition">Tecnología</a>
                <a href="#" class="hover:text-gray-300 transition">Contacto</a>
            </div>

            <!-- Botón CTA -->
            <div class="hidden md:block">
                <button
                    class="px-5 py-2 bg-white/20 border border-white/30 rounded-full text-white hover:bg-white/30 transition">
                    Empezar
                </button>
            </div>

            <!-- Botón móvil -->
            <button id="menu-btn" class="md:hidden text-white text-2xl">
                ☰
            </button>
        </div>

        <!-- Menu Mobile -->
        <div id="mobile-menu"
            class="hidden flex-col bg-black/80 backdrop-blur-md text-white px-6 py-4 space-y-4 md:hidden">
            <a href="#" class="block hover:text-gray-300">Inicio</a>
            <a href="#" class="block hover:text-gray-300">Servicios</a>
            <a href="#" class="block hover:text-gray-300">Tecnología</a>
            <a href="#" class="block hover:text-gray-300">Contacto</a>
        </div>
    </nav>
    <!-- Slider Container -->
    <div id="slider-container" class="relative w-full h-screen overflow-hidden">
        <!-- Theme Toggle Button -->
        <button id="theme-toggle"
            class="absolute top-4 right-4 z-50 p-3 rounded-full bg-white/10 backdrop-blur-md border border-white/20 hover:bg-white/20 transition-all duration-200">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
            </svg>
        </button>

        <!-- Slides Wrapper -->
        <div class="slides-wrapper relative w-full h-full">
            <!-- Slides rendered with Jinja2 loop -->
            {% for slide in slides %}
            <div class="slide absolute inset-0 w-full h-full transition-opacity duration-500 {% if loop.index0 == 0 %}opacity-100 z-10{% else %}opacity-0 z-0{% endif %}"
                data-slide-index="{{ loop.index0 }}">
                <!-- Slide Image -->
                <img src="{{ slide.image_url }}" alt="{{ slide.title }}"
                    class="slide-image absolute inset-0 w-full h-full object-cover">

                <!-- Slide Content Overlay -->
                <div
                    class="slide-content absolute inset-0 flex flex-col items-center justify-center text-center px-4 sm:px-8 md:px-16 lg:px-24 bg-gradient-to-t from-black/60 via-black/30 to-transparent">
                    <!-- Title -->
                    <h2
                        class="slide-title text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold text-white mb-4 sm:mb-6 max-w-4xl drop-shadow-lg">
                        {{ slide.title }}
                    </h2>

                    <!-- Description -->
                    <p
                        class="slide-description text-base sm:text-lg md:text-xl lg:text-2xl text-white/90 mb-6 sm:mb-8 max-w-2xl drop-shadow-md">
                        {{ slide.description }}
                    </p>

                    <!-- Button -->
                    <button
                        class="slide-button px-6 sm:px-8 py-3 sm:py-4 bg-white/10 backdrop-blur-md border border-white/20 text-white font-semibold rounded-full hover:bg-white/20 hover:scale-105 transition-all duration-300 text-sm sm:text-base md:text-lg">
                        {{ slide.button_text }}
                    </button>
                </div>
            </div>
            {% endfor %}
        </div>

        <!-- Navigation Controls -->
        <div
            class="navigation-controls absolute inset-0 flex items-center justify-between px-8 pointer-events-none z-10">
            <button
                class="nav-button prev-button pointer-events-auto w-12 h-12 rounded-full bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center hover:bg-white/20 transition-all duration-200">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <button
                class="nav-button next-button pointer-events-auto w-12 h-12 rounded-full bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center hover:bg-white/20 transition-all duration-200">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>
        </div>

        <!-- Indicators Container -->
        <div class="indicators-container absolute bottom-8 left-1/2 transform -translate-x-1/2 flex gap-3 z-20">
            <!-- Indicators will be generated dynamically in task 3.3 -->
        </div>

        <!-- Slide Counter -->
        <div
            class="slide-counter absolute bottom-8 right-8 text-white text-sm font-medium bg-white/10 backdrop-blur-md border border-white/20 px-4 py-2 rounded-full z-20">
            <span class="current-slide">1</span> / <span class="total-slides">1</span>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/slider.js') }}"></script>
</body>

</html>
